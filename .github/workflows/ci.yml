name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campus_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pnpm install

      - name: Lint frontend
        run: pnpm --filter @campus-agent/web lint
        continue-on-error: false

      - name: Lint backend
        run: cd apps/api && ruff check .
        continue-on-error: false

      - name: Typecheck frontend
        run: pnpm --filter @campus-agent/web typecheck
        continue-on-error: false

      - name: Typecheck backend
        run: cd apps/api && mypy .
        continue-on-error: false

      - name: Test frontend
        run: pnpm --filter @campus-agent/web test -- --passWithNoTests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Test backend
        run: cd apps/api && pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campus_agent_test
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY: test-secret-key-for-ci

      - name: Build frontend
        run: pnpm --filter @campus-agent/web build

      - name: Secret scan with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm --filter @campus-agent/web test:e2e
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
