name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "18"
  PYTHON_VERSION: "3.11"

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campus_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        run: python -m pip install -r apps/api/requirements.lock

      - name: Lint frontend
        run: pnpm --filter @campus-agent/web lint
        continue-on-error: false

      - name: Lint backend
        run: ruff check apps/api --no-cache

      - name: Typecheck frontend
        run: pnpm --filter @campus-agent/web typecheck
        continue-on-error: false

      - name: Typecheck backend
        run: mypy apps/api/src apps/api/tests --no-incremental

      - name: Test frontend
        run: pnpm --filter @campus-agent/web test -- --passWithNoTests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Test backend
        run: python -m pytest apps/api/tests -q -p no:cacheprovider
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campus_agent_test
          REDIS_URL: redis://localhost:6379/1
          APP_SECRET: test-secret-key-for-ci

      - name: Build frontend
        run: pnpm --filter @campus-agent/web build

      - name: Secret scan with gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config .gitleaks.toml --gitleaks-ignore-path .gitleaksignore --redact --verbose --no-banner

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @campus-agent/web exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm --filter @campus-agent/web test:e2e
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
