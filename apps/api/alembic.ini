# Alembic configuration for CampusAgent API.
#
# The actual database URL is injected at runtime by ``env.py`` from
# ``Settings.DATABASE_URL``.  The ``sqlalchemy.url`` key below is a
# placeholder and is intentionally NOT used by ``env.py``.

[alembic]
# Path to the migration environment (relative to this file).
script_location = alembic

# Version table name in the database.
version_table = alembic_version

# Template used to generate new migration scripts.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for ``file_template`` timestamp (default is local).
# timezone =

# Maximum length of characters for slugified message.
# truncate_slug_length = 40

# Set to true to output SQL via ``logging`` instead of executing.
# This is useful for dry-runs but should remain false in normal use.
# sqlalchemy.url =  # injected by env.py at runtime

# -------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
