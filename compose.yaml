# CampusAgent Docker Compose - P2-01 Baseline
#
# This Compose file provides the local development baseline with:
#   - web       (Next.js frontend, port 3000)
#   - api       (FastAPI backend, port 8000)
#   - postgres  (PostgreSQL 15, port 5432)
#   - redis     (Redis 7, port 6379)
#   - mock-model (placeholder model service, port 8001)
#
# Usage:
#   docker compose config                        # validate configuration
#   docker compose up -d postgres redis mock-model  # start core deps only
#   docker compose up -d                          # start all services
#   docker compose ps                             # check service status
#   docker compose down                           # stop all services
#
# IMPORTANT: mock-model is a P2 Compose placeholder, NOT a real model gateway.
# It will be replaced or extended in P7 (Model Gateway & Edge Node).
#
# All secrets in this file are development-only defaults.
# DO NOT use them in production.

services:
  # ----------------------------------------------------------------
  # PostgreSQL - primary database
  # ----------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: campus-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campus_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campus_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - campus_agent

  # ----------------------------------------------------------------
  # Redis - cache and pub/sub
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: campus-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - campus_agent

  # ----------------------------------------------------------------
  # Mock Model - P2 Compose placeholder service
  # NOT a real model gateway; will be replaced in P7
  # ----------------------------------------------------------------
  mock-model:
    build:
      context: ./infra/mock-model
      dockerfile: Dockerfile
    container_name: campus-agent-mock-model
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - campus_agent

  # ----------------------------------------------------------------
  # API - FastAPI backend
  # ----------------------------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: campus-agent-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_DEBUG: "false"
      APP_SECRET: dev-secret-key-change-in-production
      FIELD_ENCRYPTION_KEY: dev-encryption-key-change-in-production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/campus_agent
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      DB_POOL_TIMEOUT_SECONDS: "30"
      DB_POOL_RECYCLE_SECONDS: "1800"
      DB_ECHO_SQL: "false"
      REDIS_URL: redis://redis:6379/0
      REDIS_NAMESPACE: campus_agent
      REDIS_SOCKET_TIMEOUT_SECONDS: "5"
      REDIS_CONNECT_TIMEOUT_SECONDS: "5"
      DEFAULT_CACHE_TTL_SECONDS: "300"
      MODEL_GATEWAY_BASE_URL: http://mock-model:8001
      MODEL_GATEWAY_MODEL: step-3.7-flash
      MODEL_GATEWAY_TIMEOUT_MS: "30000"
      MODEL_GATEWAY_IS_EXTERNAL: "true"
      MODEL_GATEWAY_API_KEY: ""
      NEXT_PUBLIC_API_URL: http://localhost:8000
      LOG_LEVEL: INFO
      LOG_PROMPT_CONTENT: "false"
      ENABLE_EXTERNAL_MODEL: "false"
      PRIVATE_SCENE_TTL_HOURS: "24"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      API_V1_PREFIX: /api/v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-model:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - campus_agent

  # ----------------------------------------------------------------
  # Web - Next.js frontend
  # ----------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: campus-agent-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - campus_agent

# ----------------------------------------------------------------
# Networks
# ----------------------------------------------------------------
networks:
  campus_agent:
    driver: bridge
    name: campus_agent_net

# ----------------------------------------------------------------
# Volumes
# ----------------------------------------------------------------
volumes:
  postgres_data:
    name: campus_agent_postgres_data
  redis_data:
    name: campus_agent_redis_data
